name: ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\PanoramicData.DeepCloner.slnx

      - name: Build library
        run: dotnet build .\DeepCloner\PanoramicData.DeepCloner.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build .\DeepCloner.Tests\PanoramicData.DeepCloner.Test.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack .\DeepCloner\PanoramicData.DeepCloner.csproj --configuration Release --no-build --output .\artifacts\packages

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: .\artifacts\packages\*
